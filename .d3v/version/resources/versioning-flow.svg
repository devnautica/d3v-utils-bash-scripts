<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="2110" viewBox="0 0 1100 2110" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="2110" fill="#ffffff"/>

  <text x="30" y="35" font-size="22" font-weight="bold" fill="#0f172a">Versioning workflow (version.sh)</text>

  <!-- legend -->
  <g font-size="13" fill="#0f172a">
    <rect x="760" y="14" width="18" height="18" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="785" y="28">Process</text>
    <polygon points="769,44 787,54 769,64 751,54" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="795" y="58">Decision</text>
    <rect x="760" y="74" width="18" height="18" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="785" y="88">Alternate / rollback path</text>
    <ellipse cx="769" cy="114" rx="16" ry="10" fill="#1e293b"/>
    <text x="795" y="118">Start / End</text>
  </g>

  <g transform="translate(0,70)">

  <!-- vertical connectors (main column) -->
  <line x1="350" y1="80"   x2="350" y2="130"  stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="200"  x2="350" y2="250"  stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="320"  x2="350" y2="370"  stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="440"  x2="350" y2="500"  stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- N5 decision -> N6 (No) -->
  <line x1="350" y1="630" x2="350" y2="680" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="362" y="660" font-size="13" fill="#0f172a">No</text>

  <!-- N5 decision -> S5 (Yes) -->
  <line x1="540" y1="565" x2="670" y2="565" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="585" y="555" font-size="13" fill="#0f172a">Yes</text>

  <!-- S5 -> N6 (elbow, merges beside main "No" arrow) -->
  <path d="M820,610 L820,660 L420,660 L420,680" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="350" y1="750" x2="350" y2="790" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="880" x2="350" y2="920" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="1010" x2="350" y2="1060" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- N9 decision -> N9b (Yes) -->
  <line x1="350" y1="1180" x2="350" y2="1230" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="362" y="1210" font-size="13" fill="#0f172a">Yes</text>

  <!-- N9 decision -> S9 (No) -->
  <line x1="540" y1="1120" x2="670" y2="1120" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="588" y="1110" font-size="13" fill="#0f172a">No</text>

  <!-- S9 -> N10 (elbow) -->
  <path d="M820,1165 L820,1210 L420,1210 L420,1350" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="350" y1="1310" x2="350" y2="1350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="1440" x2="350" y2="1490" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- N11 decision -> N12 (No) -->
  <line x1="350" y1="1610" x2="350" y2="1660" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="362" y="1640" font-size="13" fill="#0f172a">No</text>

  <!-- N11 decision -> S11 (Yes) -->
  <line x1="540" y1="1550" x2="670" y2="1550" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="585" y="1540" font-size="13" fill="#0f172a">Yes</text>

  <!-- S11 -> N12 (elbow) -->
  <path d="M820,1600 L820,1650 L420,1650 L420,1660" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="350" y1="1740" x2="350" y2="1780" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="1850" x2="350" y2="1900" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- N1 start -->
  <ellipse cx="350" cy="50" rx="130" ry="30" fill="#1e293b"/>
  <text x="350" y="45" text-anchor="middle" font-size="14" fill="#ffffff">Push to main</text>
  <text x="350" y="61" text-anchor="middle" font-size="14" fill="#ffffff">(CI trigger)</text>

  <!-- N2 process -->
  <rect x="180" y="130" width="340" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="160" text-anchor="middle" font-size="14" fill="#0f172a">create-new-version job:</text>
  <text x="350" y="180" text-anchor="middle" font-size="14" fill="#0f172a">checkout repo, run version.sh</text>

  <!-- N3 process -->
  <rect x="180" y="250" width="340" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="280" text-anchor="middle" font-size="14" fill="#0f172a">increment_version():</text>
  <text x="350" y="300" text-anchor="middle" font-size="14" fill="#0f172a">read version.current.tag / buildnumber</text>

  <!-- N4 process -->
  <rect x="180" y="370" width="340" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="400" text-anchor="middle" font-size="14" fill="#0f172a">Compute proposed NEW_VERSION</text>
  <text x="350" y="420" text-anchor="middle" font-size="14" fill="#0f172a">= MAJOR.MINOR.(PATCH+1)</text>

  <!-- N5 decision -->
  <polygon points="350,500 540,565 350,630 160,565" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="350" y="558" text-anchor="middle" font-size="13" fill="#0f172a">Branch v&lt;NEW_VERSION&gt;</text>
  <text x="350" y="576" text-anchor="middle" font-size="13" fill="#0f172a">already exists on origin?</text>

  <!-- S5 alternate -->
  <rect x="670" y="520" width="300" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="820" y="548" text-anchor="middle" font-size="13" fill="#0f172a">Bump BUGFIX segment;</text>
  <text x="820" y="566" text-anchor="middle" font-size="13" fill="#0f172a">set MERGE_TO_MAIN=0</text>
  <text x="820" y="584" text-anchor="middle" font-size="13" fill="#0f172a">(repeat check)</text>

  <!-- N6 process -->
  <rect x="180" y="680" width="340" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="710" text-anchor="middle" font-size="14" fill="#0f172a">Persist version.previous.* /</text>
  <text x="350" y="730" text-anchor="middle" font-size="14" fill="#0f172a">version.current.* to app.properties</text>

  <!-- N7 process -->
  <rect x="180" y="790" width="340" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="815" text-anchor="middle" font-size="14" fill="#0f172a">copy_version_to_platform_file():</text>
  <text x="350" y="835" text-anchor="middle" font-size="14" fill="#0f172a">write tag/buildnumber into pom.xml /</text>
  <text x="350" y="855" text-anchor="middle" font-size="14" fill="#0f172a">build.gradle(.kts) by PLATFORM</text>

  <!-- N8 process -->
  <rect x="180" y="920" width="340" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="945" text-anchor="middle" font-size="14" fill="#0f172a">publish_new_version_branch():</text>
  <text x="350" y="965" text-anchor="middle" font-size="14" fill="#0f172a">checkout -b v&lt;NEW_VERSION&gt;, commit,</text>
  <text x="350" y="985" text-anchor="middle" font-size="14" fill="#0f172a">tag version-&lt;NEW_VERSION&gt;, push branch+tag</text>

  <!-- N9 decision -->
  <polygon points="350,1060 540,1120 350,1180 160,1120" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="350" y="1115" text-anchor="middle" font-size="13" fill="#0f172a">MERGE_TO_MAIN</text>
  <text x="350" y="1133" text-anchor="middle" font-size="13" fill="#0f172a">== 1?</text>

  <!-- S9 alternate -->
  <rect x="670" y="1075" width="300" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="820" y="1103" text-anchor="middle" font-size="13" fill="#0f172a">Leave unmerged;</text>
  <text x="820" y="1121" text-anchor="middle" font-size="13" fill="#0f172a">print manual-merge notice</text>
  <text x="820" y="1139" text-anchor="middle" font-size="13" fill="#0f172a">for developers</text>

  <!-- N9b process -->
  <rect x="180" y="1230" width="340" height="80" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="1260" text-anchor="middle" font-size="14" fill="#0f172a">checkout main, merge</text>
  <text x="350" y="1280" text-anchor="middle" font-size="14" fill="#0f172a">v&lt;NEW_VERSION&gt;, push to main</text>

  <!-- N10 process -->
  <rect x="180" y="1350" width="340" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="1375" text-anchor="middle" font-size="14" fill="#0f172a">check_if_there_is_forward_commit_and_act():</text>
  <text x="350" y="1395" text-anchor="middle" font-size="13" fill="#0f172a">git fetch; look for non-bot commits</text>
  <text x="350" y="1415" text-anchor="middle" font-size="13" fill="#0f172a">landed on main during this run</text>

  <!-- N11 decision -->
  <polygon points="350,1490 540,1550 350,1610 160,1550" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="350" y="1543" text-anchor="middle" font-size="13" fill="#0f172a">Forward (human) commit</text>
  <text x="350" y="1561" text-anchor="middle" font-size="13" fill="#0f172a">landed during this run?</text>

  <!-- S11 alternate -->
  <rect x="670" y="1500" width="300" height="100" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="820" y="1528" text-anchor="middle" font-size="13" fill="#0f172a">Roll back: delete branch/tag,</text>
  <text x="820" y="1546" text-anchor="middle" font-size="13" fill="#0f172a">git stash, SKIP_DEPLOY=1</text>
  <text x="820" y="1564" text-anchor="middle" font-size="13" fill="#0f172a">(skip deploy, keep build/test)</text>

  <!-- N12 process -->
  <rect x="180" y="1660" width="340" height="80" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="1690" text-anchor="middle" font-size="14" fill="#0f172a">build job (needs: create-new-version)</text>
  <text x="350" y="1710" text-anchor="middle" font-size="13" fill="#0f172a">checks out tag version-&lt;NEW_VERSION&gt;</text>

  <!-- N13 process -->
  <rect x="180" y="1780" width="340" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="1810" text-anchor="middle" font-size="14" fill="#0f172a">mvn package / deploy →</text>
  <text x="350" y="1830" text-anchor="middle" font-size="14" fill="#0f172a">publish artifact at correct version</text>

  <!-- N14 end -->
  <ellipse cx="350" cy="1930" rx="80" ry="30" fill="#1e293b"/>
  <text x="350" y="1936" text-anchor="middle" font-size="15" fill="#ffffff">Done</text>

  </g>

</svg>
